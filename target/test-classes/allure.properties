# Tells Allure where to write raw result files after each test run.
# Without this, Allure defaults to 'allure-results/' in the current working directory
# when tests are run via the IDE's TestNG runner — which is different from where
# 'mvn allure:serve' looks (target/allure-results/).
# Setting this explicitly ensures both IDE and Maven runs write to the same folder.
allure.results.directory=target/allure-results
