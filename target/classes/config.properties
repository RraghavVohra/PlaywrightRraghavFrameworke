# ─── Image Creation (Asset Library → Add New Asset → Social Post) ──────────────

# Which card to click after "Add New Asset" — card order shifts between dev and prod
# because fewer modules are installed on dev, so the card indices are different
image.social.post.index.dev=3
image.social.post.index.prod=4

# File attached on PAGE 1 of the wizard (the social post preview image)
# This triggers a native OS file dialog — Playwright handles it with waitForFileChooser()
image.attach.file=C:\\Users\\admin\\Downloads\\PushNotificationImage.png

# Image uploaded on PAGE 2 of the wizard (the actual asset image)
# This is a hidden <input type="file"> element — Playwright fills it with setInputFiles()
image.upload.file=C:\\Users\\admin\\Downloads\\Untitled design.jpg

# Name entered in the "Name" field on the Asset Details page
image.name.text=Testing's Image 2030

# Description entered in the long textarea on the Asset Details page
image.long.text=This is for testing only so let's do it now.

# Category option text — differs by env because different data is seeded on each environment
image.category.option.dev=Term
image.category.option.prod=Term Plan

# Hashtag option text — also differs by env
image.hashtag.dev=what
image.hashtag.prod=Insurance

# Partner name in the "Select Partners" dropdown on the Publish Setup page
# Same value across all environments
image.partner.option=Raj2024

# ────────────────────────────────────────────────────────────────────────────────

# Retry configuration — how many times a failed test is re-attempted before being marked FAILED.
# 2 means each test gets 1 original run + 2 retries = 3 total attempts.
# Set to 0 to disable retries entirely.
retry.count=2

# Video recording — set true to record a .webm video of every test run.
# Videos are saved to test-output/videos/. On pass, the video is auto-deleted to save disk space.
# On failure, the video is kept and its path is printed to the console.
video.enabled=true

# Tracing — set true to capture a full Playwright trace (screenshots + DOM snapshots + network).
# Traces are saved to test-output/traces/ only on test failure, as a .zip file.
# View a trace: npx playwright show-trace test-output/traces/<file>.zip
tracing.enabled=true
