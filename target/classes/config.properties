# App URL
# Switch the active base.url comment to target a different environment
#base.url=https://app.spdevmfp.com
#base.url=https://app.sppreprod.in
base.url=https://app.technochimes.com

# Environment identifier — controls which locators are used in page objects
# When you switch base.url above, also switch env below to match
# Values: dev | preprod | prod
#env=dev
#env=preprod
env=prod

# Credentials — keep all, comment out the ones you're not using
#validusername=prem.chandra@bizight.com
#validpassword=Sbtest@123
#validusername=raghav.vohra@salespanda.com
#validpassword=Sbtest@1234
validusername=eduadmin@gmail.com
validpassword=12345
# In config.properties, replace the actual values with placeholders:
# validusername=YOUR_USERNAME_HERE
# validpassword=YOUR_PASSWORD_HERE
# Then create a separate file (e.g., local.properties or use OS environment variables) with the real values, and add
# config.properties to your .gitignore so it's never committed again.

# Browser settings (true = headless, false = shows browser window)
browser.headless=false
browser.slowmo=1000
#doc.library.url=https://app.spdevmfp.com/document-library.php
#doc.upload.url=https://app.spdevmfp.com/sp-upload-document.php
# Preprod URLs include /manager/ in the path — dev does not.
# Update these when switching environments.
doc.library.url=https://app.sppreprod.in/manager/document-library.php
doc.upload.url=https://app.sppreprod.in/manager/sp-upload-document.php
doc.document.name=TestDocument
doc.description.text=This is a test description.
# Updated to "teaser" — this is a hashtag that exists on preprod and triggers the
# autocomplete suggestion. The hashtagSuggestionPreprod() locator matches exactly on "teaser".
doc.hashtag.text=teaser
doc.search.value=test
# The exact document name expected to appear in search results when using doc.search.value.
# Keeping this in config (not hardcoded in the test) makes it easy to update if the document
# is renamed or a different document is used for the search verification test.
doc.search.expected=ewewew test

